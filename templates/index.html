<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Zero To Hero</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
font-family:sans-serif;
color:#e0e0e0;
}

.container{text-align:center;max-width:700px}

h1{
font-size:2.5rem;
background:linear-gradient(90deg,#00d2ff,#7b2ff7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.badge{
display:inline-block;
margin:1rem 0 2rem;
padding:6px 16px;
border:1px solid #7b2ff7;
border-radius:20px;
color:#c4b5fd;
}

.cards{
display:flex;
gap:1rem;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
padding:20px;
min-width:150px;
}

.pipeline{
margin-top:30px;
font-size:14px;
color:#9ca3af;
}
</style>

</head>

<body>

<div class="container">

<h1>DevOps Zero To Hero</h1>

<div class="badge">Josh Batch 10</div>

<div class="cards">
<div class="card">
<span>Framework</span>
<strong>Flask</strong>
</div>

<div class="card">
<span>Runtime</span>
<strong>Python</strong>
</div>

<div class="card">
<span>Deploy</span>
<strong>AWS EC2</strong>
</div>
</div>

<div class="pipeline">
CI/CD Pipeline: Build → Lint → Test → Docker → Deploy using GitHub Actions 🚀
</div>

</div>

</body>
</html>
