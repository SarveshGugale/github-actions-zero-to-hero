name: python lint

on:
  push:
      branches: [main]

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code 
              uses: actions/checkout@v4

            - name: setup python
              uses: actions/setup-python@v5
              with:
                python-version: "3.13" 

            - name:  Install Dependencies
              run: |
                python -m pip install --upgrade pip
                pip install flake8 flask

            - name: run linter
              run: python -m flake8 app.py

          