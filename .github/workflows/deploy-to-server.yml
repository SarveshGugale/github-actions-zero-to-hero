# This will deploy safe / secure tested app to  Prod server CD 
name: Deploy to Server CD

on:
    workflow_call:

jobs: 
    deploy:
        runs-on: ubuntu-latest
        steps:
           - name: SSH to Prod server
             uses: appleboy/ssh-action@v1.0.3
             with:
