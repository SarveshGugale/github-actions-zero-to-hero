#Linting , SAST (static application security testing)
# Lint :- Flake8 use & SAST :- Bandit use (tool)

name: Code Quality

on: 
    workflow_call:

jobs: 
    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11","3.12","3.13"]

        steps:
            - name: checkout code 
              uses: actions/checkout@v4

            - name: setup python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}

            - name:  Install Dependencies
              run: |
                python -m pip install --upgrade pip
                pip install flake8 flask

            - name: run linter
              run: python -m flake8 app.py

            - name: run SAST 
              run: bandit -r app.py
